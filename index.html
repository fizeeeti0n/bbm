<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FIZ — Beat Maker Pro</title>
    <!-- MUST USE TONE.JS FOR PRECISE AUDIO SCHEDULING -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161a;
            --border: #2c2c35;
            --text: #e0e0e0;
            --text-dim: #7a7a8c;
            --accent-drum: #00f5d4;
            --accent-samp: #f15bb5;
            --playing: #fee440;
            --rec: #ff003c;
        }

        * { box-sizing: border-box; user-select: none; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER & CONTROLS --- */
        header {
            background: var(--panel);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; }

        .transport-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        button {
            background: #2a2a35;
            color: white;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:hover { background: #3a3a45; }

        .btn-play.active { background: var(--playing); color: black; }
        .btn-rec.active { background: var(--rec); color: white; border-color: #ff4d79; box-shadow: 0 0 10px rgba(255,0,60,0.5); }

        .knob-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 80px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--text);
            cursor: pointer;
            margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border);
            border-radius: 2px;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            background: var(--bg);
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent-drum);
        }
        #tab-sampler.active { border-bottom-color: var(--accent-samp); }

        /* --- MAIN WORKSPACE --- */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .view-container {
            flex: 1;
            display: none;
            padding: 20px;
            overflow-y: auto;
        }
        .view-container.active { display: block; }

        /* --- GRID SYSTEM --- */
        .track {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            background: var(--panel);
            border-radius: 6px;
            padding: 4px;
        }

        .track-header {
            width: 150px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-right: 1px solid var(--border);
            margin-right: 10px;
            border-radius: 4px;
            transition: background 0.15s ease-out;
        }
        
        /* Visual feedback for key presses */
        .track-header.hit {
            background: rgba(255, 255, 255, 0.4);
            transition: none;
        }

        .track-name { font-size: 0.85rem; font-weight: bold; width: 60px; }
        .track-key { font-size: 0.7rem; background: #333; padding: 2px 6px; border-radius: 4px; color: #aaa; }

        .steps-container {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
            flex: 1;
            max-width: 800px;
        }

        .step {
            aspect-ratio: 1;
            background: #222;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #2a2a30;
            transition: background 0.05s;
        }
        
        /* 4-step visual grouping */
        .step:nth-child(4n+1) { background: #2a2a32; }

        /* Drum Highlights */
        .drum-view .step.on { background: var(--accent-drum); box-shadow: 0 0 8px rgba(0, 245, 212, 0.4); border-color: transparent;}
        .drum-view .step.active-step { border: 1px solid white; transform: scale(1.05); }
        .drum-view .step.on.active-step { background: #fff; box-shadow: 0 0 12px var(--accent-drum); }

        /* Sampler Highlights */
        .sampler-view .step.on { background: var(--accent-samp); box-shadow: 0 0 8px rgba(241, 91, 181, 0.4); border-color: transparent;}
        .sampler-view .step.active-step { border: 1px solid white; transform: scale(1.05); }
        .sampler-view .step.on.active-step { background: #fff; box-shadow: 0 0 12px var(--accent-samp); }

        /* --- SAMPLER SPECIFIC --- */
        .sampler-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--panel);
            padding: 15px;
            border-radius: 6px;
        }
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn-upload { background: var(--accent-samp); color: black; }
        #sample-status { font-size: 0.85rem; color: var(--accent-samp); font-weight: bold; }

        /* --- FX PANEL (RIGHT) --- */
        .sidebar {
            width: 250px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .fx-module {
            background: #1a1a20;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
        }
        .fx-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;}
        .fx-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.8rem;}
        
        .clear-btn { margin-top: auto; background: transparent; border-color: #ff4d4d; color: #ff4d4d; }
        .clear-btn:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<header>
    <div class="brand">FIZ / BEAT MAKER</div>
    
    <div class="transport-controls">
        <button id="btn-rec" class="btn-rec">⏺ REC</button>
        <button id="btn-play" class="btn-play">▶ PLAY</button>
        
        <div class="knob-group" style="margin-left: 10px;">
            BPM <input type="range" id="global-bpm" min="60" max="180" value="120">
            <span id="bpm-val">120</span>
        </div>
    </div>
</header>

<div class="tabs">
    <div class="tab active" id="tab-drums" onclick="switchTab('drums')">Drums</div>
    <div class="tab" id="tab-sampler" onclick="switchTab('sampler')">Sampler (Slice)</div>
</div>

<div class="workspace">
    <!-- DRUMS VIEW -->
    <div id="view-drums" class="view-container drum-view active">
        <div id="drum-grid"></div>
    </div>

    <!-- SAMPLER VIEW -->
    <div id="view-sampler" class="view-container sampler-view">
        <div class="sampler-header">
            <div class="file-upload-wrapper">
                <button class="btn-upload">LOAD SAMPLE</button>
                <input type="file" id="audio-upload" accept="audio/*">
            </div>
            <span id="sample-status">No sample loaded. Drop a file to slice.</span>
        </div>
        <div id="sampler-grid"></div>
    </div>

    <!-- FX & MASTER SIDEBAR -->
    <div class="sidebar">
        <div class="fx-module">
            <div class="fx-title">Master</div>
            <div class="fx-row">
                Vol <input type="range" id="fx-master-vol" min="-30" max="6" value="-3" step="0.1">
            </div>
        </div>
        
        <div class="fx-module">
            <div class="fx-title">Reverb</div>
            <div class="fx-row">
                Mix <input type="range" id="fx-rev-mix" min="0" max="1" value="0.1" step="0.01">
            </div>
            <div class="fx-row">
                Decay <input type="range" id="fx-rev-decay" min="0.5" max="5" value="1.5" step="0.1">
            </div>
        </div>

        <div class="fx-module">
            <div class="fx-title">Delay</div>
            <div class="fx-row">
                Mix <input type="range" id="fx-del-mix" min="0" max="1" value="0.0" step="0.01">
            </div>
            <div class="fx-row">
                Time <input type="range" id="fx-del-time" min="0.1" max="1" value="0.3" step="0.01">
            </div>
        </div>

        <button class="clear-btn" onclick="clearAll()">CLEAR PATTERNS</button>
    </div>
</div>

<script>
// ==============================================================================
// 1. CORE STATE & DOM REFERENCES
// ==============================================================================
const STEPS = 16;
let isPlaying = false;
let isRecording = false;
let currentStep = 0;
let toneStarted = false;

// Audio context ready flag
let audioReady = false;

// Data Structures for sequencer (Expanded Drums to 8 tracks)
let drumPattern = Array(8).fill(0).map(() => Array(STEPS).fill(false));
let samplerPattern = Array(16).fill(0).map(() => Array(STEPS).fill(false));

// Direct DOM references for extreme performance (NO React overhead)
const drumEls = [];
const samplerEls = [];

const drumDefs = [
    { name: 'KICK', key: '1' },
    { name: 'SNARE', key: '2' },
    { name: 'HAT', key: '3' },
    { name: 'CLAP', key: '4' },
    { name: 'O.HAT', key: '5' },
    { name: 'TOM', key: '6' },
    { name: 'BRASS', key: '7' },
    { name: 'BELL', key: '8' }
];

const samplerKeys = ['Q','W','E','R','T','Y','U','I','A','S','D','F','G','H','J','K'];

// ==============================================================================
// 2. AUDIO ENGINE (TONE.JS) - STRICT ROUTING & NO FAKE TIMING
// ==============================================================================

// Master & FX Bus
const masterVol = new Tone.Volume(-3).toDestination();
const reverb = new Tone.Reverb({ decay: 1.5, wet: 0.1 }).connect(masterVol);
const delay = new Tone.FeedbackDelay({ delayTime: 0.3, feedback: 0.4, wet: 0.0 }).connect(reverb);

// Per-track channels (allows individual volume/pan, routing to FX)
const drumChannels = Array(8).fill(0).map(() => new Tone.Channel().connect(delay));
const samplerChannels = Array(16).fill(0).map(() => new Tone.Channel().connect(delay));

// Synths
const kickSynth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4, oscillator: { type: "sine" } }).connect(drumChannels[0]);
const snareSynth = new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.005, decay: 0.2, sustain: 0 } }).connect(drumChannels[1]);
const hatSynth = new Tone.MetalSynth({ frequency: 200, envelope: { attack: 0.001, decay: 0.1, release: 0.01 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5 }).connect(drumChannels[2]);
const clapSynth = new Tone.NoiseSynth({ noise: { type: "pink" }, envelope: { attack: 0.001, decay: 0.3, sustain: 0 } }).connect(drumChannels[3]);
const openHatSynth = new Tone.MetalSynth({ frequency: 200, envelope: { attack: 0.001, decay: 0.4, release: 0.05 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5 }).connect(drumChannels[4]);
const tomSynth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, oscillator: { type: "square" }, envelope: { attack: 0.001, decay: 0.4, sustain: 0, release: 0.1 } }).connect(drumChannels[5]);
const brassSynth = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 1.5, modulationIndex: 2, oscillator: { type: "sawtooth" },
    envelope: { attack: 0.05, decay: 0.3, sustain: 0.6, release: 0.8 },
    modulation: { type: "square" }, modulationEnvelope: { attack: 0.05, decay: 0.2, sustain: 0.4, release: 0.2 }
}).connect(drumChannels[6]);
const bellSynth = new Tone.MetalSynth({ frequency: 800, envelope: { attack: 0.001, decay: 1, release: 1 }, harmonicity: 3.2, modulationIndex: 20, resonance: 800, octaves: 1.5 }).connect(drumChannels[7]);

// Sampler Core
let sampleBuffer = null;
let sliceDuration = 0;

// ==============================================================================
// 3. AUDIO PLAYBACK FUNCTIONS (SCHEDULED)
// ==============================================================================

// Play Drum: Uses precise 'time' parameter scheduled by Tone.Transport
function playDrum(index, time = Tone.now(), vel = 1) {
    if (!toneStarted) return;
    if (index === 0) kickSynth.triggerAttackRelease("C1", "8n", time, vel);
    else if (index === 1) snareSynth.triggerAttackRelease("16n", time, vel);
    else if (index === 2) hatSynth.triggerAttackRelease("32n", time, vel * 0.8);
    else if (index === 3) clapSynth.triggerAttackRelease("16n", time, vel);
    else if (index === 4) openHatSynth.triggerAttackRelease("8n", time, vel * 0.8);
    else if (index === 5) tomSynth.triggerAttackRelease("G2", "8n", time, vel);
    else if (index === 6) brassSynth.triggerAttackRelease(["C3", "E3", "G3"], "8n", time, vel * 0.5); // Plays a Brass Chord
    else if (index === 7) bellSynth.triggerAttackRelease("16n", time, vel * 0.6);
}

// Play Slice: Creates a new BufferSource for TRUE POLYPHONY (prevents cutting off)
function playSlice(index, time = Tone.now()) {
    if (!toneStarted || !sampleBuffer || !sampleBuffer.loaded) return;
    
    // Create new source per hit to avoid polyphony choking
    const source = new Tone.BufferSource({
        url: sampleBuffer,
        fadeIn: 0.005,
        fadeOut: 0.05
    }).connect(samplerChannels[index]);
    
    const startTime = index * sliceDuration;
    source.start(time, startTime, sliceDuration);
}

// ==============================================================================
// 4. THE SEQUENCER LOOP (CORE REQUIREMENT)
// ==============================================================================
// MUST use Tone.Transport.scheduleRepeat for zero drift. 
Tone.Transport.scheduleRepeat((time) => {
    // 1. Audio Scheduling Logic
    for (let i = 0; i < 8; i++) {
        if (drumPattern[i][currentStep]) {
            playDrum(i, time);
        }
    }

    for (let i = 0; i < 16; i++) {
        if (samplerPattern[i][currentStep]) {
            playSlice(i, time);
        }
    }

    // 2. UI Update Logic (Scheduled via Tone.Draw for perfect visual sync)
    Tone.Draw.schedule(() => {
        updateGridUI(currentStep);
    }, time);

    currentStep = (currentStep + 1) % STEPS;
}, "16n");

// ==============================================================================
// 5. LIVE QUANTIZED RECORDING & UI FEEDBACK
// ==============================================================================

function flashTrack(type, index) {
    const el = type === 'drum' ? drumEls[index]?.header : samplerEls[index]?.header;
    if (el) {
        el.classList.add('hit');
        setTimeout(() => el.classList.remove('hit'), 100);
    }
}

function handleHit(type, index) {
    const now = Tone.now();
    
    // Flash the track visually to indicate it registered
    flashTrack(type, index);

    // Play audio immediately for monitoring
    if (type === 'drum') playDrum(index, now);
    if (type === 'sample') playSlice(index, now);

    // If recording and playing, quantize and record to grid
    if (isRecording && isPlaying) {
        const ticks = Tone.Transport.ticks;
        const ppq = Tone.Transport.PPQ; // Pulses Per Quarter (usually 192)
        const ticksPer16th = ppq / 4; 
        
        // Quantize: find the closest 16th note step based on current exact timing
        const quantizedStep = Math.round(ticks / ticksPer16th) % STEPS;
        
        if (type === 'drum') {
            drumPattern[index][quantizedStep] = true;
            drumEls[index][quantizedStep].classList.add('on');
        } else if (type === 'sample') {
            samplerPattern[index][quantizedStep] = true;
            samplerEls[index][quantizedStep].classList.add('on');
        }
    }
}

// ==============================================================================
// 6. UI GENERATION & DOM MANIPULATION
// ==============================================================================
function initGrid() {
    const drumContainer = document.getElementById('drum-grid');
    const samplerContainer = document.getElementById('sampler-grid');

    // Build Drum Grid
    for (let r = 0; r < 8; r++) {
        drumEls[r] = [];
        const trackDiv = document.createElement('div');
        trackDiv.className = 'track';
        
        trackDiv.innerHTML = `
            <div class="track-header">
                <span class="track-name">${drumDefs[r].name}</span>
                <span class="track-key">${drumDefs[r].key}</span>
            </div>
            <div class="steps-container" id="drum-row-${r}"></div>
        `;
        drumContainer.appendChild(trackDiv);
        
        drumEls[r].header = trackDiv.querySelector('.track-header'); // Cache header element
        const stepsContainer = trackDiv.querySelector('.steps-container');
        for (let s = 0; s < STEPS; s++) {
            const stepBtn = document.createElement('div');
            stepBtn.className = 'step';
            stepBtn.onmousedown = () => toggleStep('drum', r, s);
            stepsContainer.appendChild(stepBtn);
            drumEls[r][s] = stepBtn;
        }
    }

    // Build Sampler Grid
    for (let r = 0; r < 16; r++) {
        samplerEls[r] = [];
        const trackDiv = document.createElement('div');
        trackDiv.className = 'track';
        
        trackDiv.innerHTML = `
            <div class="track-header">
                <span class="track-name">SLC ${r+1}</span>
                <span class="track-key">${samplerKeys[r]}</span>
            </div>
            <div class="steps-container" id="samp-row-${r}"></div>
        `;
        samplerContainer.appendChild(trackDiv);
        
        samplerEls[r].header = trackDiv.querySelector('.track-header'); // Cache header element
        const stepsContainer = trackDiv.querySelector('.steps-container');
        for (let s = 0; s < STEPS; s++) {
            const stepBtn = document.createElement('div');
            stepBtn.className = 'step';
            stepBtn.onmousedown = () => toggleStep('sample', r, s);
            stepsContainer.appendChild(stepBtn);
            samplerEls[r][s] = stepBtn;
        }
    }
}

function toggleStep(type, row, step) {
    if (type === 'drum') {
        drumPattern[row][step] = !drumPattern[row][step];
        drumEls[row][step].classList.toggle('on');
    } else {
        samplerPattern[row][step] = !samplerPattern[row][step];
        samplerEls[row][step].classList.toggle('on');
    }
}

// Highly optimized visual update (No framework diffing)
let lastStep = -1;
function updateGridUI(step) {
    if (lastStep > -1) {
        for(let i=0; i<8; i++) drumEls[i][lastStep].classList.remove('active-step');
        for(let i=0; i<16; i++) samplerEls[i][lastStep].classList.remove('active-step');
    }
    for(let i=0; i<8; i++) drumEls[i][step].classList.add('active-step');
    for(let i=0; i<16; i++) samplerEls[i][step].classList.add('active-step');
    lastStep = step;
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
    
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`view-${tab}`).classList.add('active');
}

function clearAll() {
    for(let r=0; r<8; r++) {
        drumPattern[r].fill(false);
        for(let s=0; s<STEPS; s++) drumEls[r][s].classList.remove('on');
    }
    for(let r=0; r<16; r++) {
        samplerPattern[r].fill(false);
        for(let s=0; s<STEPS; s++) samplerEls[r][s].classList.remove('on');
    }
}

// ==============================================================================
// 7. EVENT LISTENERS & INITIALIZATION
// ==============================================================================

// Start Audio Engine on first user interaction
async function initAudio() {
    if (toneStarted) return;
    await Tone.start();
    await reverb.generate(); // Process reverb IR
    toneStarted = true;
    console.log("Audio Engine Started");
}

document.body.addEventListener('mousedown', initAudio, { once: true });
document.body.addEventListener('keydown', initAudio, { once: true });

// Transport Controls
document.getElementById('btn-play').onclick = async () => {
    await initAudio();
    if (!isPlaying) {
        if(Tone.Transport.state !== "started") {
            currentStep = 0;
            Tone.Transport.start();
        }
        isPlaying = true;
        document.getElementById('btn-play').classList.add('active');
        document.getElementById('btn-play').innerText = "⏸ PAUSE";
    } else {
        Tone.Transport.pause();
        isPlaying = false;
        document.getElementById('btn-play').classList.remove('active');
        document.getElementById('btn-play').innerText = "▶ PLAY";
    }
};

document.getElementById('btn-rec').onclick = () => {
    isRecording = !isRecording;
    document.getElementById('btn-rec').classList.toggle('active');
};

// BPM
document.getElementById('global-bpm').oninput = (e) => {
    const val = e.target.value;
    Tone.Transport.bpm.value = val;
    document.getElementById('bpm-val').innerText = val;
};

// FX Controls
document.getElementById('fx-master-vol').oninput = e => masterVol.volume.value = e.target.value;
document.getElementById('fx-rev-mix').oninput = e => reverb.wet.value = e.target.value;
document.getElementById('fx-rev-decay').onchange = e => reverb.decay = e.target.value;
document.getElementById('fx-del-mix').oninput = e => delay.wet.value = e.target.value;
document.getElementById('fx-del-time').oninput = e => delay.delayTime.value = e.target.value;

// Sample Upload logic
document.getElementById('audio-upload').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    await initAudio();
    const statusText = document.getElementById('sample-status');
    statusText.innerText = "Processing...";
    statusText.style.color = "white";

    try {
        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await Tone.context.decodeAudioData(arrayBuffer);
        
        // Wrap in ToneAudioBuffer
        sampleBuffer = new Tone.ToneAudioBuffer(audioBuffer);
        
        // Auto slice into 16 equal segments
        sliceDuration = sampleBuffer.duration / 16;
        
        statusText.innerText = `Loaded: ${file.name} (Sliced into 16)`;
        statusText.style.color = "var(--accent-samp)";
    } catch(err) {
        statusText.innerText = "Error decoding audio format.";
        statusText.style.color = "red";
    }
};

// Keyboard Mapping (MPC Style)
const keyMap = {
    '1': {t: 'drum', i: 0}, '2': {t: 'drum', i: 1}, '3': {t: 'drum', i: 2}, '4': {t: 'drum', i: 3},
    '5': {t: 'drum', i: 4}, '6': {t: 'drum', i: 5}, '7': {t: 'drum', i: 6}, '8': {t: 'drum', i: 7},
    'q': {t: 'sample', i: 0}, 'w': {t: 'sample', i: 1}, 'e': {t: 'sample', i: 2}, 'r': {t: 'sample', i: 3},
    't': {t: 'sample', i: 4}, 'y': {t: 'sample', i: 5}, 'u': {t: 'sample', i: 6}, 'i': {t: 'sample', i: 7},
    'a': {t: 'sample', i: 8}, 's': {t: 'sample', i: 9}, 'd': {t: 'sample', i: 10}, 'f': {t: 'sample', i: 11},
    'g': {t: 'sample', i: 12}, 'h': {t: 'sample', i: 13}, 'j': {t: 'sample', i: 14}, 'k': {t: 'sample', i: 15}
};

window.addEventListener('keydown', e => {
    if (e.repeat) return; // Prevent OS key hold repeat triggering multiple hits
    
    // Spacebar to toggle play
    if (e.code === 'Space') {
        e.preventDefault();
        document.getElementById('btn-play').click();
        return;
    }

    const mapping = keyMap[e.key.toLowerCase()];
    if (mapping) handleHit(mapping.t, mapping.i);
});

// Boot
initGrid();

</script>
